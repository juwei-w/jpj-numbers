name: Scrape JPJ numbers

# Adds a "Run workflow" button under the Actions tab.
on:
  workflow_dispatch:
    inputs:
      scope:
        description: "What to scrape (use 'all' for a publishable snapshot)"
        type: choice
        options: [all, istimewa, semasa]
        default: all
      resume:
        description: "Resume from cached work/ instead of a fresh scrape"
        type: boolean
        default: false
      publish:
        description: "Commit + push the updated page (only meaningful with scope=all)"
        type: boolean
        default: true
      istimewa_workers:
        description: "Istimewa concurrent workers (blank = one per series = 13)"
        default: ""
      semasa_workers:
        description: "Semasa concurrent workers (blank = 16; each is a full browser)"
        default: ""
  # Uncomment to also run automatically (weekly, Mon 02:00 Malaysia time):
  # schedule:
  #   - cron: "0 18 * * 0"

permissions:
  contents: write          # lets the job push the regenerated index.html back

concurrency:
  group: jpj-scrape        # never let two scrape runs overlap
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # under the 6h hosted-runner hard cap
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # Persist work/ (scrape progress) across otherwise-ephemeral runs. A rolling
      # key saves a fresh snapshot every run and restores the most recent one, so a
      # later run with resume=true continues from there. Best-effort: a hard
      # timeout/cancel may skip the save step.
      - name: Cache scrape progress (work/)
        uses: actions/cache@v4
        with:
          path: work
          key: jpj-work-${{ github.run_id }}
          restore-keys: |
            jpj-work-

      - name: Scrape
        env:
          JPJ_USER: ${{ secrets.JPJ_USER }}
          JPJ_PASS: ${{ secrets.JPJ_PASS }}
        run: |
          set -e
          if [ -z "$JPJ_USER" ] || [ -z "$JPJ_PASS" ]; then
            echo "::error::Missing JPJ_USER / JPJ_PASS repository secrets — add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -n "${{ inputs.istimewa_workers }}" ]; then export ISTIMEWA_WORKERS="${{ inputs.istimewa_workers }}"; fi
          if [ -n "${{ inputs.semasa_workers }}" ]; then export SEMASA_WORKERS="${{ inputs.semasa_workers }}"; fi
          ARGS="--no-publish"
          case "${{ inputs.scope }}" in
            istimewa) ARGS="$ARGS --skip-semasa" ;;
            semasa)   ARGS="$ARGS --skip-istimewa" ;;
          esac
          if [ "${{ inputs.resume }}" = "true" ]; then ARGS="$ARGS --resume"; fi
          echo "running: run_all.py $ARGS"
          python scripts/run_all.py $ARGS

      # Failure-safe: preserve the scraped result as an artifact REGARDLESS of how the
      # run ends. If a later step — or the final push — fails, the data is NOT lost:
      # download this artifact and re-publish in seconds (see the "Re-publish" workflow).
      # Only the data sidecars + rendered output are included — never work/auth.json
      # (the live session cookie), so no credentials ever leave the runner.
      - name: Upload result (failure-safe)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: jpj-result-${{ github.run_id }}
          path: |
            index.html
            results/
            work/numbers_*.md.json
            work/ist_*.md.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish updated page
        if: ${{ inputs.publish && success() }}
        run: |
          # Guard: never overwrite a good page with an empty/partial scrape.
          NEW=$(cat results/_count.txt 2>/dev/null || echo 0)
          OLD=$(git show origin/main:results/_count.txt 2>/dev/null || echo 0)
          if [ "${FORCE_PUBLISH:-0}" != "1" ]; then
            if [ "${NEW:-0}" -eq 0 ] 2>/dev/null; then
              echo "::warning::Not publishing — scrape produced 0 numbers. Live page kept; data is saved in the run artifact."; exit 0
            fi
            if [ "${OLD:-0}" -gt 0 ] 2>/dev/null && [ "$NEW" -lt "$((OLD/2))" ] 2>/dev/null; then
              echo "::warning::Not publishing — new total $NEW is far below live $OLD (likely a partial scrape). Live page kept; data is saved in the run artifact."; exit 0
            fi
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html results
          git commit -m "update numbers ($(date -u +%F): ${NEW} available) [skip ci]" || { echo "nothing to commit"; exit 0; }
          # Rebase onto any concurrent push before pushing, else "fetch first" rejects us.
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejected (attempt $i/3) — re-syncing with origin/main…"; sleep 3
          done
          echo "::error::push failed after 3 attempts"; exit 1
