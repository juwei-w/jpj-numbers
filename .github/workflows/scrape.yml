name: Scrape JPJ numbers

# Adds a "Run workflow" button under the Actions tab.
on:
  workflow_dispatch:
    inputs:
      scope:
        description: "What to scrape (use 'all' for a publishable snapshot)"
        type: choice
        options: [all, istimewa, semasa]
        default: all
      resume:
        description: "Resume from cached work/ instead of a fresh scrape"
        type: boolean
        default: false
      publish:
        description: "Commit + push the updated page (only meaningful with scope=all)"
        type: boolean
        default: true
  # Uncomment to also run automatically (weekly, Mon 02:00 Malaysia time):
  # schedule:
  #   - cron: "0 18 * * 0"

permissions:
  contents: write          # lets the job push the regenerated index.html back

concurrency:
  group: jpj-scrape        # never let two scrape runs overlap
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # under the 6h hosted-runner hard cap
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # Persist work/ between runs so 'resume' can continue an interrupted scrape.
      - name: Restore work cache
        if: ${{ inputs.resume }}
        uses: actions/cache@v4
        with:
          path: work
          key: jpj-work

      - name: Scrape
        env:
          JPJ_USER: ${{ secrets.JPJ_USER }}
          JPJ_PASS: ${{ secrets.JPJ_PASS }}
        run: |
          set -e
          if [ -z "$JPJ_USER" ] || [ -z "$JPJ_PASS" ]; then
            echo "::error::Missing JPJ_USER / JPJ_PASS repository secrets — add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          ARGS="--no-publish"
          case "${{ inputs.scope }}" in
            istimewa) ARGS="$ARGS --skip-semasa" ;;
            semasa)   ARGS="$ARGS --skip-istimewa" ;;
          esac
          if [ "${{ inputs.resume }}" = "true" ]; then ARGS="$ARGS --resume"; fi
          echo "running: run_all.py $ARGS"
          python scripts/run_all.py $ARGS

      - name: Publish updated page
        if: ${{ inputs.publish }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html results
          git commit -m "update numbers ($(date -u +%F)) [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
